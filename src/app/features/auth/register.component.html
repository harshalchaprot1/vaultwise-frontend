<section class="auth-page">
  <div class="auth-bg-shape shape-one"></div>
  <div class="auth-bg-shape shape-two"></div>

  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Create VaultWise Account</mat-card-title>
      <mat-card-subtitle>Register to start managing your finances</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
        <mat-form-field appearance="outline">
          <mat-label>Name</mat-label>
          <input matInput type="text" formControlName="name" placeholder="Your full name" />
          <mat-error *ngIf="form.controls.name.hasError('required')">Name is required.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="you@example.com" />
          <mat-error *ngIf="form.controls.email.hasError('required')">Email is required.</mat-error>
          <mat-error *ngIf="form.controls.email.hasError('email')">Enter a valid email.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Phone Number(s) (optional)</mat-label>
          <input matInput type="text" formControlName="phoneNos" placeholder="7987426454 or 7987426454,9876543210" />
          <mat-hint>Stored as phone_nos. Leave blank to store null.</mat-hint>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword() ? 'password' : 'text'" formControlName="password" />
          <button mat-icon-button matSuffix type="button" (click)="hidePassword.set(!hidePassword())" aria-label="Toggle password">
            <mat-icon>{{ hidePassword() ? 'visibility' : 'visibility_off' }}</mat-icon>
          </button>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Confirm Password</mat-label>
          <input matInput [type]="hideConfirmPassword() ? 'password' : 'text'" formControlName="confirmPassword" />
          <button mat-icon-button matSuffix type="button" (click)="hideConfirmPassword.set(!hideConfirmPassword())" aria-label="Toggle confirm password">
            <mat-icon>{{ hideConfirmPassword() ? 'visibility' : 'visibility_off' }}</mat-icon>
          </button>
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" [disabled]="loading()">
          {{ loading() ? 'Creating account...' : 'Register' }}
        </button>

        <p class="auth-link-row">
          Already have an account?
          <a routerLink="/auth/login">Go to login</a>
        </p>
      </form>
    </mat-card-content>
  </mat-card>
</section>
