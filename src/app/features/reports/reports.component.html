<section class="page-headline">
  <h1>Reports</h1>
  <p>Run monthly profitability snapshots and compare trends over time.</p>
</section>

<mat-card class="data-card">
  <mat-card-content>
    <form [formGroup]="yearForm" class="year-form" (ngSubmit)="load()">
      <mat-form-field appearance="outline">
        <mat-label>Year</mat-label>
        <input matInput type="number" formControlName="year" />
      </mat-form-field>
      <button mat-flat-button color="primary" type="submit">Run Report</button>
    </form>
  </mat-card-content>
</mat-card>

<mat-card class="data-card">
  <mat-card-title>Monthly Breakdown</mat-card-title>
  <mat-card-content>
    <div class="table-wrap">
      <table mat-table [dataSource]="rows()" class="vaultwise-table">
        <ng-container matColumnDef="month">
          <th mat-header-cell *matHeaderCellDef>Month</th>
          <td mat-cell *matCellDef="let row">{{ row.month }}</td>
        </ng-container>

        <ng-container matColumnDef="income">
          <th mat-header-cell *matHeaderCellDef>Income</th>
          <td mat-cell *matCellDef="let row">{{ row.income | currency }}</td>
        </ng-container>

        <ng-container matColumnDef="expense">
          <th mat-header-cell *matHeaderCellDef>Expense</th>
          <td mat-cell *matCellDef="let row">{{ row.expense | currency }}</td>
        </ng-container>

        <ng-container matColumnDef="net">
          <th mat-header-cell *matHeaderCellDef>Net</th>
          <td mat-cell *matCellDef="let row">{{ net(row) | currency }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns" class="hover-row"></tr>
      </table>
    </div>
  </mat-card-content>
</mat-card>
