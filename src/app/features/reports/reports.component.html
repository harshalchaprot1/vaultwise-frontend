<section class="page-headline">
  <h1>Reports</h1>
  <p>Run annual profitability snapshots and compare trends over time.</p>
</section>

<mat-card class="data-card">
  <mat-card-content>
    <form [formGroup]="yearForm" class="year-form" (ngSubmit)="load()">
      <mat-form-field appearance="outline">
        <mat-label>Year</mat-label>
        <input matInput type="number" formControlName="year" />
      </mat-form-field>
      <button mat-flat-button color="primary" type="submit">Run Report</button>
    </form>
  </mat-card-content>
</mat-card>

<mat-card class="data-card" *ngIf="report() as r">
  <mat-card-title>Annual Breakdown: {{ r.totalExpenses | currency }} Total</mat-card-title>
  <mat-card-content>
    <div class="table-wrap">
      <table mat-table [dataSource]="r.byCategory" class="vaultwise-table">
        <ng-container matColumnDef="category">
          <th mat-header-cell *matHeaderCellDef>Category ID</th>
          <td mat-cell *matCellDef="let row">Category {{ row.categoryId }}</td>
        </ng-container>

        <ng-container matColumnDef="spent">
          <th mat-header-cell *matHeaderCellDef>Total Spent</th>
          <td mat-cell *matCellDef="let row">{{ row.totalSpent | currency }}</td>
        </ng-container>

        <ng-container matColumnDef="transactions">
          <th mat-header-cell *matHeaderCellDef>Transactions</th>
          <td mat-cell *matCellDef="let row">{{ row.transactionCount }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns" class="hover-row"></tr>
      </table>
    </div>
  </mat-card-content>
</mat-card>
